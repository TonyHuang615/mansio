name: PR Issue Link Check

on:
  pull_request:
    types: [opened, edited, synchronize, reopened]

permissions:
  contents: read
  pull-requests: read

jobs:
  require-issue-link:
    runs-on: ubuntu-latest
    steps:
      - name: Ensure PR body references an issue
        uses: actions/github-script@v7
        with:
          script: |
            const body = (context.payload.pull_request.body || '').trim();
            const patterns = [
              /(close[sd]?|fix(e[sd])?|resolve[sd]?)\s+#\d+/i,
              /refs?\s+#\d+/i,
              /related\s+to\s+#\d+/i,
            ];

            const ok = patterns.some((re) => re.test(body));
            if (!ok) {
              core.setFailed(
                'PR description must include an issue reference like "Closes #123" or "Refs #123".'
              );
            } else {
              core.info('Issue reference found in PR body.');
            }
